name: Build Slides

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build slides
        uses: xu-cheng/latex-action@v4
        with:
          root_file: features.tex
          args: "-file-line-error -halt-on-error -interaction=nonstopmode"
          extra_system_packages: "py3-pip inkscape"
          pre_compile: "pip install --break-system-packages ./assets/theme/technikum/styles/fhtw"

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: slides
          path: build/features.pdf

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download PDF
        uses: actions/download-artifact@v4
        with:
          name: slides

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: features.pdf
          generate_release_notes: true
