<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <!-- Background -->
  <rect width="400" height="200" fill="#f9f9f9" rx="4"/>
  <!-- Grid lines -->
  <g stroke="#e0e0e0" stroke-width="0.5">
    <line x1="50" y1="30" x2="50" y2="170"/>
    <line x1="50" y1="100" x2="380" y2="100"/>
    <line x1="50" y1="50" x2="380" y2="50" stroke-dasharray="4,3"/>
    <line x1="50" y1="150" x2="380" y2="150" stroke-dasharray="4,3"/>
  </g>
  <!-- Axis labels -->
  <text x="215" y="192" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333">Time (ms)</text>
  <text x="15" y="105" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333" transform="rotate(-90,15,105)">Voltage (V)</text>
  <!-- Tick marks -->
  <g font-family="sans-serif" font-size="9" fill="#666" text-anchor="end">
    <text x="46" y="53">+1</text>
    <text x="46" y="103">0</text>
    <text x="46" y="153">−1</text>
  </g>
  <g font-family="sans-serif" font-size="9" fill="#666" text-anchor="middle">
    <text x="50" y="182">0</text>
    <text x="132" y="182">5</text>
    <text x="215" y="182">10</text>
    <text x="297" y="182">15</text>
    <text x="380" y="182">20</text>
  </g>
  <!-- Sine wave: 1 kHz signal, two full periods over 330px -->
  <path d="M50,100 C63,40 77,40 91,100 C105,160 118,160 132,100 C146,40 159,40 173,100 C187,160 200,160 215,100 C229,40 242,40 256,100 C270,160 283,160 297,100 C311,40 324,40 338,100 C352,160 366,160 380,100"
        fill="none" stroke="#e6007e" stroke-width="2"/>
  <!-- Legend -->
  <line x1="290" y1="25" x2="310" y2="25" stroke="#e6007e" stroke-width="2"/>
  <text x="314" y="29" font-family="sans-serif" font-size="10" fill="#333">sin(2πft)</text>
</svg>
